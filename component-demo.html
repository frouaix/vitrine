<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitrine Component Demo</title>
  <style>
    body {
      margin: 0;
      padding: 20px 20px 50px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f0f0;
    }
    h1 { text-align: center; color: #333; }
    p { text-align: center; color: #666; margin-bottom: 24px; }
    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .demo-card {
      background: white;
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .demo-card h2 {
      margin: 0 0 12px;
      font-size: 16px;
      color: #444;
    }
    .component-container canvas {
      display: block;
    }
    .page-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      padding: 12px 20px;
      border-top: 1px solid #ccc;
      background: #f0f0f0;
      font-size: 14px;
    }
    .page-nav a {
      color: #1a73e8;
      text-decoration: none;
    }
    .page-nav a:hover {
      text-decoration: underline;
    }
  </style>
  <script type="module" crossorigin src="/vitrine/assets/componentDemo-fapK8ZrW.js"></script>
  <link rel="modulepreload" crossorigin href="/vitrine/assets/themes-FCzjyZF4.js">
  <link rel="modulepreload" crossorigin href="/vitrine/assets/transformCalendar-BqUYK5JF.js">
  <link rel="modulepreload" crossorigin href="/vitrine/assets/transform-Cq1y9VD4.js">
</head>
<body>
  <h1>Vitrine Component Demo</h1>
  <p>Multiple independent Vitrine components, each with its own canvas and render loop.</p>

  <div class="demo-grid">
    <div class="demo-card">
      <h2>GUI Form (Light Theme)</h2>
      <div id="form-component" class="component-container"></div>
    </div>

    <div class="demo-card">
      <h2>GUI Controls (Dark Theme)</h2>
      <div id="controls-component" class="component-container"></div>
    </div>

    <div class="demo-card">
      <h2>Raw Blocks</h2>
      <div id="blocks-component" class="component-container"></div>
    </div>
  </div>


  <nav class="page-nav">
    <a href="calendar.html">← Calendar</a>
    <a href="gallery.html">Gallery →</a>
  </nav>
</body>
</html>
